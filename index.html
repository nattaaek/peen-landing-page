<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>peen — find climbing routes near you</title>
<link rel="icon" href="assets/app-icon.jpg"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; background: #FCFBFE; color: #1F1F20; font-family: "Google Sans", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { cursor: pointer; }
  a:hover { opacity: 0.92; }
  button { cursor: pointer; font-family: inherit; }
  a { -webkit-tap-highlight-color: transparent; }

  ::selection { background: #D55A1F; color: #fff; }

  /* Bobbing rocks */
  @keyframes peenBob {
    from { transform: translate(-50%, -50%) translateY(-1.7px) rotate(var(--rot, 0deg)); }
    to   { transform: translate(-50%, -50%) translateY(1.7px)  rotate(var(--rot, 0deg)); }
  }

  /* Chalk dust drift */
  @keyframes peenChalk {
    0%   { transform: translate3d(0, 0, 0); opacity: 0; }
    10%  { opacity: var(--peak, 0.4); }
    90%  { opacity: 0.05; }
    100% { transform: translate3d(var(--drift, 0), -110vh, 0); opacity: 0; }
  }

  /* Letter reveal */
  @keyframes peenLetterIn {
    from { opacity: 0; transform: translateY(18px) rotate(-3deg); }
    to   { opacity: 1; transform: translateY(0) rotate(0); }
  }

  /* Highlight stripe */
  @keyframes peenHighlight {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* Floating chips */
  @keyframes peenFloat {
    from { transform: translateY(-6px); }
    to   { transform: translateY(6px); }
  }

  /* Bounce arrow */
  @keyframes peenBounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(6px); }
  }

  /* Pyramid bar grow on first paint */
  @keyframes peenBarGrow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  .peen-pyramid-bar { transform-origin: left center; animation: peenBarGrow 1s cubic-bezier(.22,.61,.36,1) both; }

  /* Marquee */
  @keyframes peenMarquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.3333%); }
  }
  .peen-marquee { animation: peenMarquee 40s linear infinite; }

  /* Scroll hint */
  .peen-scroll-hint { animation: peenFade 1.4s 1.6s both; }
  @keyframes peenFade { from { opacity: 0; } to { opacity: 1; } }

  /* Mascot peek wiggle */
  .peen-mascot-peek { animation: peenWiggle 5s ease-in-out infinite; transform-origin: 80% 80%; }
  @keyframes peenWiggle {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(-4deg) translateY(-4px); }
  }

  /* Responsive layout */
  @media (max-width: 980px) {
    .peen-nav-links { display: none !important; }
    .peen-hero-grid { grid-template-columns: 1fr !important; gap: 60px !important; }
    .peen-features-grid > * { grid-column: span 12 !important; }
    .peen-features-grid > * > div { height: auto !important; min-height: 300px; padding: 26px !important; }
    .peen-split { grid-template-columns: 1fr !important; }
    .peen-split > div:first-child { min-height: 320px; }
  }
  @media (max-width: 640px) {
    .peen-hero-grid { padding: 24px 20px 60px !important; }
    .peen-phones-row { gap: 20px !important; }
  }

  #root { display: block; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script src="js/vendor-three.bundle.js" defer></script>
<script src="js/tweaks-panel.bundle.js" defer></script>
<script src="js/primitives.bundle.js" defer></script>
<script src="js/hero-3d.bundle.js" defer></script>
<script src="js/phone-screens.bundle.js" defer></script>
<script src="js/sections.bundle.js" defer></script>
<script src="js/app.bundle.js" defer></script>
</body>
</html>
